apiVersion: power.cluster-power-manager.github.io/v1alpha1
kind: Uncore
metadata:
  name: uncore-config
  namespace: power-manager
spec:
  # nodeSelector specifies which nodes this Uncore config applies to.
  # If omitted, the config applies to all nodes running the Power Node Agent.
  nodeSelector:
    labelSelector:
      matchLabels:
        feature.node.kubernetes.io/cpu-model.vendor_id: Intel
  sysMax: 2300000
  sysMin: 1300000
  dieSelector:
    - package: 0
      die: 0
      min: 1500000
      max: 2400000
    # - package: 0
    #   die: 1
    #   min: 1200000
    #   max: 2400000
