              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PowerNodeConfigSpec defines the desired state of PowerNodeConfig.
            properties:
              nodeSelector:
                description: |-
                  NodeSelector specifies which nodes this PowerNodeConfig applies to.
                  If not specified, the config applies to all nodes running the Power Node Agent.
                properties:
                  labelSelector:
