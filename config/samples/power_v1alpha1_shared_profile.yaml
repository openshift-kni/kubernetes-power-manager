apiVersion: power.cluster-power-manager.github.io/v1alpha1
kind: PowerProfile
metadata:
  labels:
    app.kubernetes.io/name: PowerProfile
    app.kubernetes.io/instance: shared
    app.kubernetes.io/part-of: kubernetes-power-manager
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: kubernetes-power-manager
  name: shared
  namespace: power-manager
spec:
  shared: true
  pstates:
    max: 1000
    min: 1000
    epp: "power"
    governor: "powersave"
  cstates:
    # Configure C-states using either 'maxLatencyUs' or 'names', but not both
    maxLatencyUs: 1
    #names:
    #  C1: true
    #  C6: false
