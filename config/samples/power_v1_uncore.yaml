apiVersion: power.openshift.io/v1
kind: Uncore
metadata:
  labels:
    app.kubernetes.io/name: Uncore
    app.kubernetes.io/instance: uncore-sample
    app.kubernetes.io/part-of: kubernetes-power-manager
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/created-by: kubernetes-power-manager
  name: uncore-sample
  namespace: power-manager
spec:
  # nodeSelector specifies which nodes this Uncore config applies to.
  # If omitted, the config applies to all nodes running the Power Node Agent.
  nodeSelector:
    labelSelector:
      matchLabels:
        feature.node.kubernetes.io/cpu-model.vendor_id: Intel
  sysMax: 2300000
  sysMin: 1300000
  dieSelector:
    - package: 0
      die: 0
      min: 1500000
      max: 2400000
