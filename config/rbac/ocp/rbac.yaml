apiVersion: v1
kind: ServiceAccount
metadata:
  name: power-manager-operator
  namespace: power-manager

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: power-manager-node-agent
  namespace: power-manager

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: operator-custom-resource-definitions-role
  namespace: power-manager
rules:
  - apiGroups: [ "", "power.cluster-power-manager.github.io", "apps", "coordination.k8s.io" ]
    resources: [ "powerconfigs", "powerconfigs/status", "powerprofiles", "powerprofiles/status", "events", "daemonsets", "configmaps", "configmaps/status", "leases","uncores" ]
    verbs: [ "*" ]
  - apiGroups:
    - security.openshift.io
    resourceNames:
    - privileged
    resources:
    - securitycontextconstraints
    verbs:
    - use
---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: operator-custom-resource-definitions-role-binding
  namespace: power-manager
subjects:
  - kind: ServiceAccount
    name: power-manager-operator
    namespace: power-manager
roleRef:
  kind: Role
  name: operator-custom-resource-definitions-role
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: operator-nodes
rules:
  - apiGroups: [ "", "power.cluster-power-manager.github.io", "apps" ]
    resources: [ "nodes", "nodes/status", "pods", "configmaps", "configmaps/status", "powerconfigs", "powerconfigs/status", "powernodeconfigs", "powernodeconfigs/status", "powerprofiles", "powerprofiles/status", "powernodestates", "powernodestates/status", "events", "daemonsets","uncores", "uncores/status" ]
    verbs: [ "*" ]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: operator-nodes-binding
subjects:
  - kind: ServiceAccount
    name: power-manager-operator
    namespace: power-manager
roleRef:
  kind: ClusterRole
  name: operator-nodes
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-agent-cluster-resources
rules:
  - apiGroups: [ "", "batch", "power.cluster-power-manager.github.io" ]
    resources: [ "nodes", "nodes/status", "pods", "pods/status", "powernodeconfigs", "powerprofiles", "powerprofiles/status", "powernodestates", "powernodestates/status", "uncores", "uncores/status" ]
    verbs: [ "*" ]
  - apiGroups:
    - security.openshift.io
    resourceNames:
    - privileged
    resources:
    - securitycontextconstraints
    verbs:
    - use
---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-agent-cluster-resources-binding
subjects:
  - kind: ServiceAccount
    name: power-manager-node-agent
    namespace: power-manager
roleRef:
  kind: ClusterRole
  name: node-agent-cluster-resources
  apiGroup: rbac.authorization.k8s.io

---
