---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - power.cluster-power-manager.github.io
  resources:
  - powerconfigs
  - powernodestates
  - powerprofiles
  - uncores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - power.cluster-power-manager.github.io
  resources:
  - powerconfigs/status
  - powernodestates/status
  - powerprofiles/status
  - uncores/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - power.cluster-power-manager.github.io
  resources:
  - powernodeconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - power.cluster-power-manager.github.io
  resources:
  - uncores/finalizers
  verbs:
  - update
- apiGroups:
  - security.openshift.io
  resourceNames:
  - privileged
  resources:
  - securitycontextconstraints
  verbs:
  - use
